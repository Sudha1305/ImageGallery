<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover beautiful travel destinations, beaches, temples, and world wonders in our premium image gallery">
    <meta name="keywords" content="images, photos, gallery, travel, beaches, temples, wonders, cities">
    <title>Explorer Gallery | Premium Travel Photography</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <!-- Navigation Header -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">📸</span>
                <span class="logo-text">Explorer Gallery</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">Home</a>
                <a href="#" class="nav-link">Popular</a>
                <a href="#" class="nav-link">About</a>
            </div>
            <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">🌙</button>
        </div>
    </nav>

    <!-- Hero Header -->
    <header class="header-container">
        <div class="headerText">
            <nav class="breadcrumb">
                <span class="breadcrumb-item">Home</span>
                <span class="breadcrumb-separator">›</span>
                <span class="breadcrumb-item active">Gallery</span>
            </nav>
            <h1>Discover Amazing Destinations</h1>
            <p class="subtitle">Explore stunning travel photography from around the world. Curated collection of beaches, temples, world wonders & vibrant cities.</p>
            <div class="searchBox">
                <input id="searchInput" type="search" placeholder="Search destinations, beaches, temples, wonders...">
                <button id="searchBtn">
                    <span class="search-icon">🔍</span>
                    <span class="search-text">Search</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Filter Buttons -->
    <div class="filterButtons">
        <button class="filter-btn active" data-filter="all">All Sections</button>
        <button class="filter-btn" data-filter="beaches">Beaches</button>
        <button class="filter-btn" data-filter="temples">Temples</button>
        <button class="filter-btn" data-filter="wonders">Wonders</button>
        <button class="filter-btn" data-filter="cities">Cities</button>
    </div>

    <!-- Lightbox -->
    <div class="fullImageClass" id="fullImageBox">
        <button class="nav-btn prev-btn" id="prevBtn">❮</button>
        <div class="lightbox-wrapper">
            <div class="lightbox-content">
                <span id="crossIcon">✕</span>
                <img src="" alt="" id="fullImage">
            </div>
            <div class="lightbox-footer">
                <div class="lightbox-caption" id="lightboxCaption"></div>
                <div class="lightbox-actions">
                    <a id="downloadBtn" class="download-btn" download="gallery-image.jpg">Download</a>
                </div>
            </div>
        </div>
        <button class="nav-btn next-btn" id="nextBtn">❯</button>
    </div>

    <div id="messageBox" class="message-box"></div>

    <!-- Gallery Container -->
    <div class="imageGallery" id="imageGallery"></div>
    <div class="load-more-container">
        <button id="loadMoreBtn" class="load-more-btn">Load More</button>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <!-- Footer -->
    <footer class="footer-bottom">
        <p id="footerCopyright">&copy; <span id="footerYear"></span> Explorer Gallery. All rights reserved.</p>
    </footer>
</body>

</html>
